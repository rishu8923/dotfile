exec $mako
exec $bar

exec_always fcitx5
exec_always --no-startup-id wl-paste --watch cliphist store

# Restore last theme on login; fall back to gruvbox-material on first boot
exec sh -c 'THEME=$(cat ~/.cache/hellwal/last-theme 2>/dev/null); hellwal --theme "${THEME:-gruvbox-material}" >/dev/null 2>&1 || true'

set $qt_platformtheme qt6ct

exec_always dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway
exec_always --no-startup-id systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
