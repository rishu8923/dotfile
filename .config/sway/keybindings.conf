bindsym $mod+Return exec $term
bindsym $mod+Shift+p kill
bindsym $mod+d exec $menu
bindsym $mod+Shift+c reload

bindsym $mod+Shift+e exec swaynag -t warning \
  -m 'Exit sway?' \
  -B 'Yes' 'swaymsg exit'

# Focus / Movement
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Workspaces — move container to workspace
bindsym $mod+Shift+1 move container to workspace 1
bindsym $mod+Shift+2 move container to workspace 2
bindsym $mod+Shift+3 move container to workspace 3
bindsym $mod+Shift+4 move container to workspace 4
bindsym $mod+Shift+5 move container to workspace 5
bindsym $mod+Shift+6 move container to workspace 6
bindsym $mod+Shift+7 move container to workspace 7
bindsym $mod+Shift+8 move container to workspace 8
bindsym $mod+Shift+9 move container to workspace 9
bindsym $mod+Shift+0 move container to workspace 10

# Resize mode
mode "resize" {
    bindsym $left resize shrink width 10px
    bindsym $right resize grow width 10px
    bindsym $up resize shrink height 10px
    bindsym $down resize grow height 10px

    bindsym Left resize shrink width 10px
    bindsym Right resize grow width 10px
    bindsym Up resize shrink height 10px
    bindsym Down resize grow height 10px

    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"

# Split
bindsym $mod+m splith
bindsym $mod+b splitv

# Media / Brightness
bindsym --locked XF86AudioMute        exec pamixer -t
bindsym --locked XF86AudioLowerVolume exec pamixer -d 5
bindsym --locked XF86AudioRaiseVolume exec pamixer -i 5

bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
bindsym --locked XF86MonBrightnessUp   exec brightnessctl set 5%+

# Screenshot
bindsym Print exec grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%F-%H-%M-%S).png

# Screenrecord
bindsym Shift+Print exec wf-recorder -g "$(slurp)" -f ~/Videos/Screenrecords/$(date +%F-%H-%M-%S).mp4
bindsym Ctrl+Shift+Print exec pkill -INT wf-recorder

bindsym $mod+Shift+t exec ~/.config/scripts/theme-switcher.sh

bindsym $mod+Space exec pkill otter-launcher || kitty \
  --app-id otter-launcher \
  otter-launcher

# Layout modes
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+s layout stacking

bindsym $mod+f fullscreen toggle

floating_modifier $mod

bindsym $mod+Escape exec swaylock --screenshots --effect-blur 12x6 --effect-vignette 0.5:0.5

bindsym $mod+Shift+v exec ~/.config/scripts/vpn-switcher.sh
